{% extends 'base.html' %}


{% block content %}
{% load crispy_forms_tags %}

<div class="row">
    <!-- Left Sidebar -->
    <!-- side bar here -->
    {% include 'dashboard/sidebar.html' %}


    <div class="col-md-9">
        <h4>Add New Category</h4>

        <form action="{% url 'add_category' %}" method="POST" style="width: 500px;">
            {% csrf_token %}
            {{ form | crispy }}
            <button type="submit" class="btn btn-warning">Submit</button>
        </form>
    </div>
</div>

{% endblock %}
